<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortune 500 Earnings Calendar</title>

  <!-- Tailwind CSS (CDN — swap for local build in production) -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5' }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FullCalendar v6 (MIT licensed, CDN) -->
  <link  href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    /* ── FullCalendar dark-mode overrides ── */
    .dark .fc {
      --fc-border-color: #374151;
      --fc-neutral-bg-color: #111827;
      --fc-page-bg-color: #111827;
      --fc-today-bg-color: rgba(99,102,241,0.12);
      --fc-event-text-color: #fff;
      --fc-button-bg-color: #1f2937;
      --fc-button-border-color: #374151;
      --fc-button-hover-bg-color: #374151;
      --fc-button-hover-border-color: #4b5563;
      --fc-button-active-bg-color: #6366f1;
      --fc-button-active-border-color: #6366f1;
      color: #f9fafb;
    }
    .dark .fc-col-header-cell { background-color: #0f172a; }
    .dark .fc-daygrid-day     { background-color: #111827; }
    .dark .fc-list-day-cushion{ background-color: #1f2937; }
    .dark .fc-list-event-dot  { border-color: #6366f1; }
    .dark .fc th, .dark .fc td{ border-color: #1f2937 !important; }

    /* Light mode overrides */
    .light-mode .fc {
      --fc-today-bg-color: rgba(99,102,241,0.07);
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

    /* Ticker chip */
    .ticker-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 9999px;
      background: #4f46e5; color: #fff; font-size: 0.75rem; font-weight: 600;
    }
    .ticker-chip button { background: none; border: none; cursor: pointer;
                          color: rgba(255,255,255,0.7); padding: 0; line-height:1; }

    /* Sidebar scroll */
    #sidebar { overflow-y: auto; scrollbar-width: thin; }

    /* FC event compact style */
    .fc-event-title { font-weight: 600; font-size: 0.72rem; }

    /* Loading overlay */
    #loadingOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; transition: opacity 0.2s;
    }
    #loadingOverlay.hidden { opacity: 0; pointer-events: none; }

    /* Mobile sidebar toggle */
    @media (max-width: 768px) {
      #sidebar { position: fixed; left: -16rem; top: 0; height: 100vh;
                 z-index: 40; transition: left 0.25s; }
      #sidebar.open { left: 0; }
    }
  </style>
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

  <!-- ═══════════════════════════ HEADER ═══════════════════════════ -->
  <header class="flex items-center justify-between px-4 py-3
                 bg-gray-900 border-b border-gray-800 z-30 sticky top-0 shadow-lg">
    <div class="flex items-center gap-3">
      <!-- Mobile sidebar toggle -->
      <button id="sidebarToggle"
              class="md:hidden p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition-colors"
              aria-label="Toggle filters">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-sm font-bold">
          F5
        </div>
        <div>
          <h1 class="font-bold text-base leading-tight">Fortune 500</h1>
          <p class="text-xs text-gray-400 leading-tight">Earnings Calendar</p>
        </div>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <!-- Event count badge -->
      <span id="eventCountBadge"
            class="hidden text-xs text-gray-400 bg-gray-800 px-2 py-1 rounded-full">
        — events
      </span>
      <!-- Dark mode toggle -->
      <button id="darkModeToggle"
              class="p-2 rounded-lg bg-gray-800 hover:bg-gray-700 transition-colors"
              aria-label="Toggle dark mode" title="Toggle dark/light mode">
        <svg id="moonIcon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════ MAIN ═════════════════════════════ -->
  <div class="flex flex-1 overflow-hidden">

    <!-- ──────────────── SIDEBAR ──────────────── -->
    <aside id="sidebar"
           class="w-64 flex-shrink-0 bg-gray-900 border-r border-gray-800
                  flex flex-col gap-4 p-4 z-40">

      <!-- Year selector -->
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">
          Year
        </label>
        <select id="yearSelect"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm
                       focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors">
        </select>
      </div>

      <!-- Quarter filter -->
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">
          Quarter
        </label>
        <div class="grid grid-cols-5 gap-1" id="quarterBtns">
          <button data-q=""   class="quarter-btn active-q col-span-1 px-1 py-1.5 rounded text-xs font-semibold transition-colors">All</button>
          <button data-q="Q1" class="quarter-btn col-span-1 px-1 py-1.5 rounded text-xs font-semibold transition-colors">Q1</button>
          <button data-q="Q2" class="quarter-btn col-span-1 px-1 py-1.5 rounded text-xs font-semibold transition-colors">Q2</button>
          <button data-q="Q3" class="quarter-btn col-span-1 px-1 py-1.5 rounded text-xs font-semibold transition-colors">Q3</button>
          <button data-q="Q4" class="quarter-btn col-span-1 px-1 py-1.5 rounded text-xs font-semibold transition-colors">Q4</button>
        </div>
      </div>

      <!-- Industry filter -->
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">
          Industry
        </label>
        <select id="industrySelect"
                class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm
                       focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors">
          <option value="">All Industries</option>
        </select>
      </div>

      <!-- Ticker search -->
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">
          Ticker Search
        </label>
        <div class="relative">
          <input id="tickerInput" type="text"
                 placeholder="e.g. AAPL, MSFT…"
                 autocomplete="off"
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors pr-8" />
          <!-- Autocomplete dropdown -->
          <ul id="tickerDropdown"
              class="hidden absolute z-50 w-full bg-gray-800 border border-gray-700
                     rounded-lg mt-1 max-h-48 overflow-y-auto shadow-xl text-sm">
          </ul>
        </div>
        <!-- Selected ticker chips -->
        <div id="tickerChips" class="flex flex-wrap gap-1 mt-2"></div>
      </div>

      <!-- Reset filters -->
      <button id="resetFilters"
              class="text-xs text-gray-500 hover:text-gray-300 transition-colors text-left">
        Reset all filters
      </button>

      <!-- Divider -->
      <hr class="border-gray-800" />

      <!-- Legend -->
      <div>
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Legend</p>
        <div id="legend" class="flex flex-col gap-1.5 text-xs"></div>
      </div>

      <!-- Sidebar overlay close (mobile) -->
      <div class="flex-1"></div>
    </aside>

    <!-- Mobile sidebar backdrop -->
    <div id="sidebarBackdrop"
         class="hidden fixed inset-0 bg-black/50 z-30 md:hidden"
         aria-hidden="true"></div>

    <!-- ──────────────── CALENDAR ──────────────── -->
    <main class="flex-1 overflow-auto p-3 md:p-4">
      <div id="calendar" class="h-full min-h-[600px]"></div>
    </main>
  </div>

  <!-- ═══════════════════ EVENT DETAIL MODAL ════════════════════ -->
  <div id="modal"
       class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4"
       role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl w-full max-w-md
                transform transition-all">
      <!-- Modal header -->
      <div class="flex items-start justify-between p-5 border-b border-gray-800">
        <div class="flex items-center gap-3">
          <div id="modalColorDot" class="w-3 h-3 rounded-full flex-shrink-0 mt-0.5"></div>
          <div>
            <h2 id="modalTitle" class="font-bold text-lg leading-tight"></h2>
            <p id="modalSubtitle" class="text-gray-400 text-sm"></p>
          </div>
        </div>
        <button id="closeModal"
                class="text-gray-500 hover:text-white p-1 rounded-lg hover:bg-gray-800
                       transition-colors ml-4 flex-shrink-0"
                aria-label="Close">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Modal body -->
      <div class="p-5 grid grid-cols-2 gap-4 text-sm" id="modalBody">
      </div>

      <!-- Modal footer -->
      <div class="px-5 pb-5 flex items-center justify-between">
        <a id="modalYahooLink" href="#" target="_blank" rel="noopener noreferrer"
           class="text-indigo-400 hover:text-indigo-300 text-sm transition-colors flex items-center gap-1">
          View on Yahoo Finance
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
        </a>
        <button id="filterToTicker"
                class="text-xs bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5
                       rounded-lg transition-colors font-semibold">
          Filter this ticker
        </button>
      </div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="hidden">
    <div class="flex flex-col items-center gap-3">
      <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-sm text-gray-300">Loading earnings data…</p>
    </div>
  </div>

  <!-- ═══════════════════════════ SCRIPT ════════════════════════════ -->
  <script>
  (() => {
    'use strict';

    // ── Config ──────────────────────────────────────────────────────────
    // Same origin works both locally (FastAPI serves /api) and on Vercel
    const API = '';

    const INDUSTRY_COLORS = {
      'Technology':              '#6366f1',
      'Healthcare':              '#10b981',
      'Financials':              '#f59e0b',
      'Energy':                  '#ef4444',
      'Retail':                  '#8b5cf6',
      'Consumer':                '#ec4899',
      'Automotive':              '#14b8a6',
      'Telecommunications':      '#3b82f6',
      'Media':                   '#f97316',
      'Industrial':              '#64748b',
      'Aerospace':               '#0ea5e9',
      'Logistics':               '#a855f7',
      'Real Estate':             '#84cc16',
      'default':                 '#6b7280',
    };

    function colorFor(industry) {
      if (!industry) return INDUSTRY_COLORS.default;
      for (const [key, color] of Object.entries(INDUSTRY_COLORS)) {
        if (key !== 'default' && industry.toLowerCase().includes(key.toLowerCase())) {
          return color;
        }
      }
      return INDUSTRY_COLORS.default;
    }

    // ── State ────────────────────────────────────────────────────────────
    const state = {
      darkMode:        localStorage.getItem('darkMode') !== 'false',
      selectedYear:    null,
      selectedQuarter: null,
      selectedTickers: new Set(),
      selectedIndustry:'',
      companies:       [],
      currentEvent:    null,
    };

    // ── DOM refs ─────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const yearSelect     = $('yearSelect');
    const industrySelect = $('industrySelect');
    const tickerInput    = $('tickerInput');
    const tickerDropdown = $('tickerDropdown');
    const tickerChips    = $('tickerChips');
    const modal          = $('modal');
    const loadingOverlay = $('loadingOverlay');
    const eventCountBadge= $('eventCountBadge');
    const sidebar        = $('sidebar');

    let calendar;

    // ── Dark mode ────────────────────────────────────────────────────────
    function applyDarkMode() {
      document.documentElement.classList.toggle('dark', state.darkMode);
      $('moonIcon').classList.toggle('hidden', !state.darkMode);
      $('sunIcon').classList.toggle('hidden',  state.darkMode);
    }

    $('darkModeToggle').addEventListener('click', () => {
      state.darkMode = !state.darkMode;
      localStorage.setItem('darkMode', state.darkMode);
      applyDarkMode();
    });

    // ── Mobile sidebar ───────────────────────────────────────────────────
    $('sidebarToggle').addEventListener('click', () => {
      sidebar.classList.toggle('open');
      $('sidebarBackdrop').classList.toggle('hidden');
    });
    $('sidebarBackdrop').addEventListener('click', () => {
      sidebar.classList.remove('open');
      $('sidebarBackdrop').classList.add('hidden');
    });

    // ── Year selector ────────────────────────────────────────────────────
    function populateYears() {
      const currentYear = new Date().getFullYear();
      for (let y = currentYear - 1; y <= currentYear + 2; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        if (y === currentYear) opt.selected = true;
        yearSelect.appendChild(opt);
      }
      state.selectedYear = currentYear;
    }

    yearSelect.addEventListener('change', () => {
      state.selectedYear = parseInt(yearSelect.value, 10);
      // Jump calendar to Jan 1 of the selected year
      const targetDate = new Date(state.selectedYear, 0, 1);
      calendar.gotoDate(targetDate);
      calendar.refetchEvents();
    });

    // ── Quarter buttons ───────────────────────────────────────────────────
    function styleQuarterBtns() {
      document.querySelectorAll('.quarter-btn').forEach(btn => {
        const isActive = btn.dataset.q === (state.selectedQuarter || '');
        btn.className = btn.className
          .replace(/bg-\S+|text-\S+(?=\s)/g, '')
          .trim();
        if (isActive) {
          btn.classList.add('bg-indigo-600', 'text-white');
        } else {
          btn.classList.add('bg-gray-800', 'text-gray-400', 'hover:bg-gray-700', 'hover:text-white');
        }
      });
    }

    document.querySelectorAll('.quarter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.selectedQuarter = btn.dataset.q || null;
        styleQuarterBtns();
        calendar.refetchEvents();
      });
    });

    // ── Industry selector ────────────────────────────────────────────────
    async function populateIndustries() {
      try {
        const res = await fetch(`${API}/api/industries`);
        const industries = await res.json();
        industries.forEach(ind => {
          const opt = document.createElement('option');
          opt.value = ind;
          opt.textContent = ind;
          industrySelect.appendChild(opt);
        });
      } catch (e) {
        console.warn('Could not load industries', e);
      }
    }

    industrySelect.addEventListener('change', () => {
      state.selectedIndustry = industrySelect.value;
      calendar.refetchEvents();
    });

    // ── Ticker autocomplete ───────────────────────────────────────────────
    async function loadCompanies() {
      try {
        const res = await fetch(`${API}/api/companies`);
        state.companies = await res.json();
      } catch (e) {
        console.warn('Could not load companies', e);
      }
    }

    tickerInput.addEventListener('input', () => {
      const q = tickerInput.value.trim().toUpperCase();
      if (!q) { tickerDropdown.classList.add('hidden'); return; }

      const matches = state.companies
        .filter(c => c.ticker.startsWith(q) || c.name.toUpperCase().includes(q))
        .slice(0, 10);

      if (!matches.length) { tickerDropdown.classList.add('hidden'); return; }

      tickerDropdown.innerHTML = matches.map(c => `
        <li data-ticker="${c.ticker}"
            class="px-3 py-2 cursor-pointer hover:bg-gray-700 flex items-center justify-between
                   ${state.selectedTickers.has(c.ticker) ? 'opacity-50' : ''}">
          <span class="font-mono font-bold text-indigo-400">${c.ticker}</span>
          <span class="text-gray-400 truncate ml-2 text-xs">${c.name}</span>
        </li>
      `).join('');

      tickerDropdown.querySelectorAll('li').forEach(li => {
        li.addEventListener('click', () => {
          addTicker(li.dataset.ticker);
          tickerInput.value = '';
          tickerDropdown.classList.add('hidden');
        });
      });

      tickerDropdown.classList.remove('hidden');
    });

    // Close dropdown on outside click
    document.addEventListener('click', e => {
      if (!tickerInput.contains(e.target) && !tickerDropdown.contains(e.target)) {
        tickerDropdown.classList.add('hidden');
      }
    });

    tickerInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const val = tickerInput.value.trim().toUpperCase();
        if (val) {
          addTicker(val);
          tickerInput.value = '';
          tickerDropdown.classList.add('hidden');
        }
      }
    });

    function addTicker(ticker) {
      if (!ticker || state.selectedTickers.has(ticker)) return;
      state.selectedTickers.add(ticker);
      renderChips();
      calendar.refetchEvents();
    }

    function removeTicker(ticker) {
      state.selectedTickers.delete(ticker);
      renderChips();
      calendar.refetchEvents();
    }

    function renderChips() {
      tickerChips.innerHTML = [...state.selectedTickers].map(t => `
        <span class="ticker-chip">
          ${t}
          <button data-ticker="${t}" aria-label="Remove ${t}">×</button>
        </span>
      `).join('');
      tickerChips.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => removeTicker(btn.dataset.ticker));
      });
    }

    // ── Reset filters ─────────────────────────────────────────────────────
    $('resetFilters').addEventListener('click', () => {
      state.selectedYear    = new Date().getFullYear();
      state.selectedQuarter = null;
      state.selectedTickers.clear();
      state.selectedIndustry = '';

      yearSelect.value    = state.selectedYear;
      industrySelect.value = '';
      tickerInput.value   = '';
      renderChips();
      styleQuarterBtns();

      calendar.gotoDate(new Date(state.selectedYear, 0, 1));
      calendar.refetchEvents();
    });

    // ── Legend ────────────────────────────────────────────────────────────
    function renderLegend() {
      const legendEl = $('legend');
      const entries = Object.entries(INDUSTRY_COLORS).filter(([k]) => k !== 'default');
      legendEl.innerHTML = entries.map(([label, color]) => `
        <div class="flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${color}"></span>
          <span class="text-gray-400">${label}</span>
        </div>
      `).join('');
    }

    // ── Calendar ──────────────────────────────────────────────────────────
    function buildFetchParams(fetchInfo) {
      const params = new URLSearchParams();
      params.set('start', fetchInfo.startStr.split('T')[0]);
      params.set('end',   fetchInfo.endStr.split('T')[0]);

      if (state.selectedYear)    params.set('year',     state.selectedYear);
      if (state.selectedQuarter) params.set('quarter',  state.selectedQuarter);
      if (state.selectedIndustry)params.set('industry', state.selectedIndustry);
      if (state.selectedTickers.size) {
        params.set('ticker', [...state.selectedTickers].join(','));
      }
      return params.toString();
    }

    function initCalendar() {
      const calendarEl = $('calendar');

      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: window.innerWidth < 640 ? 'listMonth' : 'dayGridMonth',
        initialDate: new Date(state.selectedYear, 0, 1),
        height: 'auto',
        headerToolbar: {
          left:   'prev,next today',
          center: 'title',
          right:  'dayGridMonth,listWeek,listMonth',
        },
        buttonText: {
          today:     'Today',
          month:     'Month',
          listWeek:  'Week',
          listMonth: 'List',
        },
        events: async (fetchInfo, successCb, failureCb) => {
          loadingOverlay.classList.remove('hidden');
          try {
            const res = await fetch(`${API}/api/earnings?${buildFetchParams(fetchInfo)}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const events = await res.json();
            successCb(events);

            // Update badge
            eventCountBadge.textContent = `${events.length} event${events.length !== 1 ? 's' : ''}`;
            eventCountBadge.classList.remove('hidden');
          } catch (err) {
            console.error('Failed to fetch events', err);
            failureCb(err);
          } finally {
            loadingOverlay.classList.add('hidden');
          }
        },
        eventClick: showModal,
        eventDidMount: (info) => {
          const p = info.event.extendedProps;
          info.el.title = `${p.company} — ${p.quarter || ''} ${p.fiscal_year || ''}`.trim();
        },
        dayMaxEvents: 4,
        moreLinkClick: 'popover',
        nowIndicator: true,
        weekends: false,  // Earnings rarely reported on weekends
        businessHours: false,
        eventOrder: 'rank',
        noEventsText: 'No earnings found for this period & filter.',
      });

      calendar.render();
    }

    // ── Modal ─────────────────────────────────────────────────────────────
    function showModal(clickInfo) {
      const event = clickInfo.event;
      const p     = event.extendedProps;
      state.currentEvent = p;

      const color = event.backgroundColor || colorFor(p.industry);

      $('modalColorDot').style.background = color;
      $('modalTitle').textContent         = p.company || p.ticker;
      $('modalSubtitle').textContent      = formatDate(event.startStr);

      const eps_est = p.eps_estimate != null
        ? `$${Number(p.eps_estimate).toFixed(2)}`
        : 'N/A';
      const eps_act = p.actual_eps != null
        ? `$${Number(p.actual_eps).toFixed(2)}`
        : 'Pending';

      $('modalBody').innerHTML = `
        ${field('Ticker',       `<span class="font-mono font-bold text-indigo-400">${p.ticker}</span>`)}
        ${field('Quarter',      p.quarter ? `${p.quarter} FY${p.fiscal_year}` : '—')}
        ${field('Industry',     p.industry || '—')}
        ${field('F500 Rank',    p.rank ? `#${p.rank}` : '—')}
        ${field('EPS Estimate', eps_est)}
        ${field('Actual EPS',   eps_act)}
        ${field('Date',         formatDate(event.startStr))}
        ${field('Source',       p.source || 'seed')}
      `;

      const yahooTicker = p.ticker.replace('.', '-');
      $('modalYahooLink').href = `https://finance.yahoo.com/quote/${yahooTicker}/`;

      $('filterToTicker').onclick = () => {
        addTicker(p.ticker);
        closeModal();
      };

      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function field(label, value) {
      return `
        <div class="bg-gray-800/60 rounded-lg p-3">
          <p class="text-xs text-gray-500 mb-1">${label}</p>
          <p class="font-medium text-sm">${value}</p>
        </div>
      `;
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso + 'T12:00:00');
      return d.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    }

    function closeModal() {
      modal.classList.add('hidden');
      document.body.style.overflow = '';
      state.currentEvent = null;
    }

    $('closeModal').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Boot sequence ─────────────────────────────────────────────────────
    async function init() {
      applyDarkMode();
      populateYears();
      styleQuarterBtns();
      renderLegend();

      // Load reference data in parallel
      await Promise.all([loadCompanies(), populateIndustries()]);

      initCalendar();
    }

    init().catch(console.error);

  })();
  </script>
</body>
</html>
